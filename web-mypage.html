<!doctype html>
<html lang="ja">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cycling-Book My Page – マイルート/ライドログ</title>
  <link rel="icon" href="data:,">
  <style>
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto;
      max-width: 840px;
      margin: 20px auto;
      padding: 0 12px;
      color: #111827;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      flex-wrap: wrap;
      gap: 8px;
    }

    .btn {
      padding: 6px 10px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      text-decoration: none;
      color: #111827;
    }

    .btn:visited {
      color: #111827;
      text-decoration: none;
    }

    .btn:hover {
      background: #f3f4f6;
      color: #111827;
      text-decoration: none;
    }

    .btn.danger {
      border-color: #fecaca;
      color: #b91c1c;
      background: #fff1f2;
    }

    .btn.danger:hover {
      background: #ffe4e6;
    }

    .muted {
      color: #6b7280;
    }

    .status {
      margin: 12px 0 0;
      padding: 10px 12px;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      background: #f8fafc;
      color: #334155;
    }

    .status.error {
      border-color: #fecaca;
      background: #fff1f2;
      color: #b91c1c;
    }

    .status.success {
      border-color: #bbf7d0;
      background: #f0fdf4;
      color: #166534;
    }

    .card {
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 10px 12px;
      margin: 10px 0;
      background: #fff;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .badge {
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 12px;
      border: 1px solid #e5e7eb;
    }

    .badge.pub {
      background: #d1fae5;
      color: #065f46;
      border-color: #a7f3d0;
    }

    .badge.prv {
      background: #fee2e2;
      color: #991b1b;
      border-color: #fecaca;
    }

    .tabs {
      display: flex;
      align-items: flex-end;
      gap: 0;
      margin: 16px 0 0;
      padding: 0 8px;
      border-bottom: 1px solid #dbe2ea;
    }

    .tab {
      position: relative;
      margin-bottom: -1px;
      padding: 12px 18px 11px;
      border: 1px solid transparent;
      border-bottom: none;
      border-radius: 14px 14px 0 0;
      background: linear-gradient(180deg, #f8fafc 0%, #eef2f7 100%);
      color: #64748b;
      font-weight: 600;
      cursor: pointer;
      transition: background .18s ease, color .18s ease, border-color .18s ease;
    }

    .tab:hover {
      color: #0f172a;
      background: linear-gradient(180deg, #fbfdff 0%, #f3f6fa 100%);
    }

    .tab.active {
      background: #fff;
      color: #111827;
      border-color: #dbe2ea;
      box-shadow: 0 -1px 0 #fff inset;
    }

    .tab.active::after {
      content: "";
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: 0;
      height: 3px;
      border-radius: 999px 999px 0 0;
      background: #111827;
    }

    .panel {
      display: none;
      padding: 14px 0 0;
    }

    .panel.active {
      display: block;
    }
  </style>

  <script src="js/version.js"></script>
  <script>
    if (typeof window.APP_VERSION === 'undefined' || !window.APP_VERSION) {
      window.APP_VERSION = new Date().toISOString().slice(0, 10) + '-dev';
    }
  </script>

  <!-- Supabase UMD -->
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/profile-common.js"></script>
  <script>
    const SUPABASE_URL = "https://cqiqhczxuiyakptdjowr.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNxaXFoY3p4dWl5YWtwdGRqb3dyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTc3NzAwNzMsImV4cCI6MjA3MzM0NjA3M30.vCFQoQnsClINKa5tQAz-rNnF5XLEukmn_Nl0Err5k3k";
    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: false } });
    window.client = client; // デバッグ用に公開

    const V = () => encodeURIComponent(window.APP_VERSION || "");
    const $ = (s) => document.querySelector(s);

    async function getSession() {
      try { const { data: { session } } = await client.auth.getSession(); if (session?.user) return session; } catch (e) { console.warn('getSession(getSession) warn', e); }
      try { const { data: { user } } = await client.auth.getUser(); if (user) return { user }; } catch (e) { console.warn('getSession(getUser) warn', e); }
      return null;
    }
    async function getMyAccountId() {
      return AuthCommon.getMyAccountId(client);
    }

    function visToBool(r) { return r?.is_public === true || r?.visibility === 'public'; }
    const fmtKm = (m) => m == null ? '-' : (Number(m) / 1000).toFixed(2) + ' km';
    const fmtMin = (s) => s == null ? '-' : Math.round(Number(s) / 60) + ' 分';
    const escapeHtml = (value) => String(value ?? '').replace(/[&<>"']/g, (ch) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
    function routeTypeLabel(routeType, origin, sourceRunId) {
      if (origin === 'drawn') return '描画ルート';
      if (routeType === 'planned') return '描画ルート';
      if (routeType === 'from_run' && origin === 'manual') return '描画ルート';
      if (routeType === 'from_run' && sourceRunId) return '実走履歴';
      if (routeType === 'from_run') return '実走履歴';
      if (routeType === 'manual') return '描画ルート';
      return routeType || '';
    }

    function isAutoGeneratedRunRoute(routeRow) {
      return routeRow?.origin === 'from_log' && routeRow?.route_type === 'from_run';
    }

    function setPageStatus(message, kind) {
      const box = $('#page-status');
      if (!box) return;
      if (!message) {
        box.hidden = true;
        box.textContent = '';
        box.className = 'status';
        return;
      }
      box.hidden = false;
      box.textContent = message;
      box.className = 'status' + (kind ? ` ${kind}` : '');
    }

    async function deleteOwnedRow(table, id, acc) {
      const { error } = await client
        .from(table)
        .delete()
        .eq('id', id)
        .eq('account_id', acc);
      if (error) throw error;
    }

    async function deleteMyRoute(routeId) {
      const acc = await getMyAccountId();
      if (!acc) throw new Error('未ログインのため削除できません。');
      await deleteOwnedRow('routes', routeId, acc);
    }

    async function deleteMyRun(runId) {
      const acc = await getMyAccountId();
      if (!acc) throw new Error('未ログインのため削除できません。');
      await deleteOwnedRow('runs', runId, acc);
    }

    async function renderGate() {
      const gate = $('#gate');
      try {
        const s = await getSession();
        if (!s?.user) {
          gate.innerHTML = `未ログインです。<a class="btn" href="web-login.html?v=${V()}">ログインへ</a>`;
          $('#list-routes').innerHTML = '';
          $('#list-runs').innerHTML = '';
          return false;
        }
        const email = s.user.email || '';
        gate.innerHTML = `
          ログイン中: <strong>${email}</strong>
          <button class="btn" data-signout style="margin-left:8px">サインアウト</button>
          <a class="btn" style="margin-left:6px;" href="web-explore.html?v=${V()}">トップへ</a>
        `;
        return true;
      } catch (e) { gate.textContent = '認証状態の取得に失敗しました'; console.error(e); return false; }
    }

    async function loadMyRoutes() {
      const box = $('#list-routes'); if (!box) return;
      const acc = await getMyAccountId(); if (!acc) { box.textContent = '未ログインのため表示できません。'; return; }
      box.textContent = '読み込み中…';
      try {
        const { data, error } = await client
          .from('routes')
          .select('id,name,created_at,is_public,route_type,source_run_id,origin,account_id')
          .eq('account_id', acc)
          .order('created_at', { ascending: false });
        if (error) throw error;
        const routes = (data || []).filter((r) => !isAutoGeneratedRunRoute(r));
        if (!routes.length) { box.textContent = 'あなたのマイルートはまだありません。'; return; }
        box.innerHTML = routes.map(r => {
          const when = r.created_at ? new Date(r.created_at).toLocaleString() : '-';
          const badge = r.is_public ? '<span class="badge pub">公開</span>' : '<span class="badge prv">非公開</span>';
          const typeLabel = routeTypeLabel(r.route_type, r.origin, r.source_run_id);
          const from = typeLabel ? `<span class="muted" style="font-size:12px;">${escapeHtml(typeLabel)}${r.source_run_id ? (' #' + escapeHtml(r.source_run_id)) : ''}</span>` : '';
          const title = escapeHtml(r.name || '(無題ルート)');
          // 編集ボタンは当面用途がないため display:none で残す
          return `
            <div class="card" data-id="${r.id}" style="width:100%;gap:12px;align-items:flex-start;">
              <div style="flex:1 1 auto;cursor:pointer;" data-detail>
                <div style="font-weight:600;">${title} <span class="muted">#${r.id}</span></div>
                <div class="muted" style="font-size:12px;">${when}</div>
                ${from ? `<div>${from}</div>` : ''}
              </div>
              <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
                ${badge}
                <button class="btn danger" type="button" data-delete-route="${r.id}">削除</button>
                <a class="btn" href="route-edit.html?id=${encodeURIComponent(r.id)}" style="display:none;" aria-hidden="true">編集</a>
              </div>
            </div>`;
        }).join('');
        document.querySelectorAll('#list-routes [data-detail]').forEach(el => {
          el.addEventListener('click', () => {
            const id = el.closest('[data-id]')?.getAttribute('data-id');
            if (!id) return;
            location.href = `web-detail.html?id=${encodeURIComponent(id)}&kind=route&v=${V()}`;
          });
        });
        document.querySelectorAll('#list-routes [data-delete-route]').forEach(btn => {
          btn.addEventListener('click', async (event) => {
            event.stopPropagation();
            const routeId = btn.getAttribute('data-delete-route');
            if (!routeId) return;
            if (!confirm('このマイルートを削除しますか？')) return;
            const previous = btn.textContent;
            btn.disabled = true;
            btn.textContent = '削除中…';
            setPageStatus('');
            try {
              await deleteMyRoute(routeId);
              setPageStatus('マイルートを削除しました。', 'success');
              await loadMyRoutes();
            } catch (e) {
              setPageStatus('マイルートの削除に失敗しました: ' + (e?.message || e), 'error');
              console.error('delete route error', e);
            } finally {
              btn.disabled = false;
              btn.textContent = previous;
            }
          });
        });
      } catch (e) {
        const message = e && e.message ? e.message : String(e || '');
        const code = e && e.code ? String(e.code) : '';
        const normalized = message.toLowerCase();
        if (code === '42703' || normalized.includes('runs.account_id')) {
          console.warn('loadMyRideLogs: account_id column missing, treating as empty list');
          box.textContent = 'あなたのマイルートはまだありません。';
        } else {
          box.textContent = '読み込みに失敗しました: ' + message;
        }
        console.error('loadMyRoutes error', e);
      }
    }

    async function loadMyRideLogs() {
      const box = $('#list-runs'); if (!box) return;
      const acc = await getMyAccountId(); if (!acc) { box.textContent = '未ログインのため表示できません。'; return; }
      box.textContent = '読み込み中…';
      try {
        const { data, error } = await client
          .from('runs')
          .select('id,name,created_at,distance_m,duration_s,geojson,polyline')
          .eq('account_id', acc)
          .order('created_at', { ascending: false });
        if (error) throw error;
        const rideLogs = data || []; if (!rideLogs.length) { box.textContent = 'あなたの実走ログはまだありません。'; return; }
        box.innerHTML = rideLogs.map(rideLog => {
          const when = rideLog.created_at ? new Date(rideLog.created_at).toLocaleString() : '-';
          const title = escapeHtml(rideLog.name ? rideLog.name : when);
          return `
            <div class="card" style="width:100%;gap:12px;" data-id="${rideLog.id}">
              <div style="flex:1 1 auto;cursor:pointer;" data-detail>
                <div style="font-weight:600;">${title}</div>
                <div class="muted" style="font-size:12px;">${fmtKm(rideLog.distance_m)}・${fmtMin(rideLog.duration_s)}</div>
              </div>
              <div style="display:flex;align-items:center;gap:8px;">
                <button class="btn" type="button" data-detail>詳細</button>
                <button class="btn danger" type="button" data-delete-run="${rideLog.id}">削除</button>
              </div>
            </div>`;
        }).join('');
        document.querySelectorAll('#list-runs [data-detail]').forEach(el => {
          el.addEventListener('click', () => {
            const id = el.closest('[data-id]')?.getAttribute('data-id');
            if (!id) return;
            location.href = `web-detail.html?id=${encodeURIComponent(id)}&kind=run&v=${V()}`;
          });
        });
        document.querySelectorAll('#list-runs [data-delete-run]').forEach(btn => {
          btn.addEventListener('click', async (event) => {
            event.stopPropagation();
            const runId = btn.getAttribute('data-delete-run');
            if (!runId) return;
            if (!confirm('この実走ログを削除しますか？')) return;
            const previous = btn.textContent;
            btn.disabled = true;
            btn.textContent = '削除中…';
            setPageStatus('');
            try {
              await deleteMyRun(runId);
              setPageStatus('実走ログを削除しました。', 'success');
              await loadMyRideLogs();
            } catch (e) {
              setPageStatus('実走ログの削除に失敗しました: ' + (e?.message || e), 'error');
              console.error('delete run error', e);
            } finally {
              btn.disabled = false;
              btn.textContent = previous;
            }
          });
        });
      } catch (e) {
        const message = e && e.message ? e.message : String(e || '');
        const code = e && e.code ? String(e.code) : '';
        const normalized = message.toLowerCase();
        if (code === '42703' || normalized.includes('runs.account_id')) {
          console.warn('loadMyRideLogs: account_id column missing, treating as empty list');
          box.textContent = 'あなたの実走ログはまだありません。';
        } else {
          box.textContent = '読み込みに失敗しました: ' + message;
        }
        console.error('loadMyRideLogs error', e);
      }
    }

    async function init() {
      // タブ
      const tabRoutes = $('#tab-routes'); const tabRuns = $('#tab-runs');
      const panelRoutes = $('#panel-routes'); const panelRuns = $('#panel-runs');
      const activate = (which) => {
        const r = which === 'routes';
        tabRoutes.classList.toggle('active', r);
        tabRuns.classList.toggle('active', !r);
        tabRoutes.setAttribute('aria-selected', r ? 'true' : 'false');
        tabRuns.setAttribute('aria-selected', r ? 'false' : 'true');
        panelRoutes.classList.toggle('active', r);
        panelRuns.classList.toggle('active', !r);
      };
      tabRoutes.onclick = () => { activate('routes'); loadMyRoutes(); };
      tabRuns.onclick = () => { activate('runs'); loadMyRideLogs(); };

      // ヘッダのトップリンクに現在のバージョンを付与
      try {
        const lnTop = document.getElementById('lnTop');
        const lnRun = document.getElementById('lnRun');
        const lnRouteEdit = document.getElementById('lnRouteEdit');
        const v = encodeURIComponent(window.APP_VERSION || '');
        if (lnTop) lnTop.href = 'web-explore.html?v=' + v;
        if (lnRun) lnRun.href = 'run.html?v=' + v;
        if (lnRouteEdit) lnRouteEdit.href = 'route-edit.html?v=' + v;
      } catch (e) { console.warn('set header link failed', e); }

      const ok = await renderGate(); if (ok) await loadMyRoutes();
      client.auth.onAuthStateChange(async (_event, session) => {
        if (!session?.user) {
          const url = 'web-explore.html?v=' + V() + '&ts=' + Date.now();
          location.replace(url);
          return;
        }
        const ok2 = await renderGate();
        if (ok2) {
          if (tabRoutes.classList.contains('active')) await loadMyRoutes();
          else await loadMyRideLogs();
        }
      });
      window.addEventListener('pageshow', async () => { const ok3 = await renderGate(); if (ok3) { if (tabRoutes.classList.contains('active')) await loadMyRoutes(); else await loadMyRideLogs(); } });
    }
    document.addEventListener('DOMContentLoaded', init, { once: true });
  </script>

  <!-- ✅ ここから共通化パート -->
  <script src="js/auth-common.js"></script>
  <script>
    AuthCommon.init(client, { redirectUrl: 'web-explore.html' });
    window.getMyAccountId = () => AuthCommon.getMyAccountId(client);
  </script>

</head>

<body>
  <header>
    <div style="font-weight:700;">Cycling-Book　My Page</div>
    <div>
      <a id="lnProfile" class="btn" href="web-profile.html">プロフィール設定</a>
      <a id="lnRouteEdit" class="btn" href="route-edit.html">マイルートを作成する</a>
      <a id="lnRun" class="btn" href="run.html">実走を始める</a>
      <a id="lnTop" class="btn" href="web-explore.html">トップへ</a>
    </div>
  </header>

  <div id="gate" class="card"></div>
  <div id="page-status" class="status" hidden></div>

  <div class="tabs" role="tablist" aria-label="マイページ切り替え">
    <button id="tab-routes" class="tab active" type="button" role="tab" aria-selected="true"
      aria-controls="panel-routes">マイルート</button>
    <button id="tab-runs" class="tab" type="button" role="tab" aria-selected="false"
      aria-controls="panel-runs">ライドログ</button>
  </div>
  <section id="panel-routes" class="panel active" role="tabpanel" aria-labelledby="tab-routes">
    <div id="list-routes" class="muted">読み込み中…</div>
  </section>
  <section id="panel-runs" class="panel" role="tabpanel" aria-labelledby="tab-runs">
    <div id="list-runs" class="muted">読み込み中…</div>
  </section>

  <footer class="muted" style="margin-top:14px;">v: <code id="ver"></code></footer>
  <script>document.getElementById('ver').textContent = window.APP_VERSION;</script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./service-worker.js?v=' + (window.APP_VERSION || ''))
        .catch(err => console.error('SW register failed', err));
    }
  </script>
  <script>
    const lnProfile = document.getElementById('lnProfile');
    if (lnProfile) lnProfile.href = `web-profile.html?v=${V()}`;
  </script>
</body>

</html>
